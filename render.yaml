# Render Blueprint — creates the whole deployment from this one file.
# In Render: New ▸ Blueprint ▸ connect the VanApt repo ▸ Apply.
#
# What it provisions (FREE tier — for a short trial):
#   - one web service (the dashboard + API) on the free plan
#   - auto-scrape on cold start, so listings are fresh whenever it wakes
#
# Free-plan tradeoffs (by design — no persistent disk on free):
#   - the instance SLEEPS after ~15 min idle; first load after that is slow
#     (~1 min: it cold-starts AND scrapes)
#   - favorites/discards do NOT survive a sleep or redeploy (ephemeral storage)
#   To keep favorites + always-on, switch plan: free -> starter and add a disk
#   (see DEPLOYMENT.md) — that's the $7/mo option.
#
# You will be prompted for VANAPT_USER / VANAPT_PASS on first apply — those are
# the login your daughter uses. Pick anything you like.

services:
  - type: web
    name: vanapt
    runtime: python
    plan: free               # free trial; sleeps when idle. -> "starter" ($7/mo) for always-on.
    region: oregon           # closest Render region to Vancouver
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    autoDeploy: true         # redeploy automatically on git push
    healthCheckPath: /healthz   # unauthenticated; / returns 401 when auth is on
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: VANAPT_REFRESH_HOURS   # refresh interval (free instance scrapes on each cold start too)
        value: "24"
      - key: VANAPT_USER            # login username — you set this on apply
        sync: false
      - key: VANAPT_PASS            # login password — you set this on apply
        sync: false
      - key: SCRAPERAPI_KEY         # Craigslist hard-blocks our IP; this routes its
        sync: false                 # requests through ScraperAPI (scraperapi.com, free 1k/mo).
                                    # Leave unset to fetch Craigslist directly.
      # - key: SCRAPERAPI_PARAMS    # optional: extra ScraperAPI opts, default "country_code=ca".
      #   value: "country_code=ca&premium=true"   # add premium=true if basic IPs still get 403
